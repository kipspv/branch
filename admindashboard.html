<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --dock-bottom: max(18px, env(safe-area-inset-bottom));
      --card-radius: 28px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      transition:
        background-color 260ms ease,
        color 260ms ease,
        border-color 260ms ease,
        box-shadow 260ms ease,
        opacity 180ms ease,
        transform 180ms ease;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    input, select, button {
      font-family: inherit;
    }

    input, select {
      color-scheme: light;
    }

    .dark input,
    .dark select {
      color-scheme: dark;
    }

    .fade-in {
      animation: fadeIn .35s ease both;
    }

    .slide-up {
      animation: slideUp .42s ease both;
    }

    .dock-pop {
      animation: dockPop .42s cubic-bezier(.2,.9,.2,1.15) both;
    }

    .modal-pop {
      animation: modalPop .24s cubic-bezier(.2,.9,.2,1.12) both;
    }

    .toast-in {
      animation: toastIn .26s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes dockPop {
      from { opacity: 0; transform: translateY(20px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes modalPop {
      from { opacity: 0; transform: translateY(18px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .custom-scroll::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, .42);
      border-radius: 999px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, .72);
    }

    .theme-switching {
      pointer-events: none;
    }

    .glass-dark {
      background: rgba(15, 23, 42, .78);
      backdrop-filter: blur(26px) saturate(1.35);
      -webkit-backdrop-filter: blur(26px) saturate(1.35);
    }

    .glass-light {
      background: rgba(255, 255, 255, .78);
      backdrop-filter: blur(26px) saturate(1.25);
      -webkit-backdrop-filter: blur(26px) saturate(1.25);
    }

    @media (prefers-reduced-motion: reduce) {
      *, .fade-in, .slide-up, .dock-pop, .modal-pop, .toast-in {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    /***********************
     * FRONTEND CONFIG
     ***********************/
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyMWiYzb3q1cSsj7P4GR7f8Orlx4cV-Qq9CoA-EnLaMx3XyHLfoSnzGZI49r3vaJQJadw/exec';

    const SESSION_KEY = 'gas_auth_token';
    const THEME_KEY = 'admin_dashboard_theme';
    const ATTENDANCE_SETTINGS_KEY = 'admin_attendance_color_settings';

    const MONTH_NAMES = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];

    const MONTH_SHORT_NAMES = [
      'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
      'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'
    ];

    const DAY_SHORT_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const DAY_SHORT_NAMES_ID = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];

    const DEFAULT_ATTENDANCE_SETTINGS = {
      lowMax: 5,
      mediumMin: 6,
      mediumMax: 7,
      highMin: 8,
    };

    /***********************
     * API
     ***********************/
    async function runGas(action, ...params) {
      if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL === 'PASTE_YOUR_GAS_WEB_APP_URL_HERE') {
        throw new Error('GAS_WEB_APP_URL belum diatur.');
      }

      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ action, params }),
      });

      const text = await response.text();

      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error('Response server bukan JSON valid. Cek deployment GAS atau permission Web App.');
      }
    }

    /***********************
     * DATA CLEANING HELPERS
     ***********************/
    function cleanText(value) {
      return String(value || '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function titleCase(value) {
      const cleaned = cleanText(value);
      if (!cleaned) return '';

      return cleaned
        .split(' ')
        .map(part => {
          if (!part) return '';
          if (/^[A-Z]{2,}$/.test(part)) return part;
          return part.charAt(0).toUpperCase() + part.slice(1).toLowerCase();
        })
        .join(' ');
    }

    function displayTrainerName(value) {
      return titleCase(value);
    }

    function canonicalTrainerName(value) {
      return cleanText(value)
        .toLowerCase()
        .replace(/[.,/#!$%^&*;:{}=\-_`~()]/g, ' ')
        .replace(/\b(miss|ms|mrs|mr|teacher|trainer|sir|madam|kak|ustadz|ustadzah)\b/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function normalizeClassPayload(form) {
      return {
        trainerName: displayTrainerName(form.trainerName),
        level: cleanText(form.level),
        jamSection: cleanText(form.jamSection),
        branch: cleanText(form.branch),
        status: cleanText(form.status || 'Active'),
      };
    }

    function makeLocalDateInput(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getWorkingDaysInMonth(month, year) {
      const totalDays = new Date(Number(year), Number(month), 0).getDate();

      return Array.from({ length: totalDays }, (_, index) => {
        const day = index + 1;
        const date = new Date(Number(year), Number(month) - 1, day);
        const weekday = date.getDay();

        return {
          day,
          month: Number(month),
          year: Number(year),
          weekday,
          weekdayLabel: DAY_SHORT_NAMES[weekday],
          weekdayLabelId: DAY_SHORT_NAMES_ID[weekday],
          dateOnlyLabel: String(day),
          weekdayDateLabel: `${DAY_SHORT_NAMES_ID[weekday]} ${day}`,
          label: `${day} ${MONTH_SHORT_NAMES[Number(month) - 1]}`,
        };
      }).filter(item => item.weekday >= 1 && item.weekday <= 5);
    }

    function getClassKey(item, useCanonicalTrainer = true) {
      const trainer = useCanonicalTrainer
        ? canonicalTrainerName(item['Trainer Name'] || item.trainerName)
        : cleanText(item['Trainer Name'] || item.trainerName).toLowerCase();

      return [
        cleanText(item.Branch || item.branch).toLowerCase(),
        cleanText(item['Jam/Section'] || item.jamSection).toLowerCase(),
        cleanText(item.Level || item.level).toLowerCase(),
        trainer,
      ].join('|');
    }

    function buildTrainerSuggestions(classes) {
      const map = {};

      (classes || []).forEach(item => {
        const original = cleanText(item['Trainer Name']);
        const display = displayTrainerName(original);
        const key = canonicalTrainerName(original);
        if (!key || !display) return;

        if (!map[key]) {
          map[key] = display;
        }
      });

      return Object.values(map).sort((a, b) => a.localeCompare(b));
    }

    function analyzeClassData(classes) {
      const trainerGroups = {};
      const exactTrainerMap = {};
      const classKeyMap = {};
      const formattingIssues = [];

      (classes || []).forEach(item => {
        const originalTrainer = cleanText(item['Trainer Name']);
        const cleanTrainer = displayTrainerName(originalTrainer);
        const trainerKey = canonicalTrainerName(originalTrainer);
        const exactTrainerKey = originalTrainer.toLowerCase();
        const classKey = getClassKey(item, true);

        if (originalTrainer && originalTrainer !== cleanTrainer) {
          formattingIssues.push({ item, originalTrainer, cleanTrainer });
        }

        if (trainerKey) {
          if (!trainerGroups[trainerKey]) trainerGroups[trainerKey] = [];
          trainerGroups[trainerKey].push(item);
        }

        if (exactTrainerKey) {
          if (!exactTrainerMap[exactTrainerKey]) exactTrainerMap[exactTrainerKey] = [];
          exactTrainerMap[exactTrainerKey].push(item);
        }

        if (classKey) {
          if (!classKeyMap[classKey]) classKeyMap[classKey] = [];
          classKeyMap[classKey].push(item);
        }
      });

      const suspiciousTrainerGroups = Object.keys(trainerGroups)
        .map(key => {
          const items = trainerGroups[key];
          const variants = Array.from(new Set(items.map(item => cleanText(item['Trainer Name'])).filter(Boolean)));
          return { key, items, variants };
        })
        .filter(group => group.variants.length > 1)
        .sort((a, b) => b.variants.length - a.variants.length);

      const duplicateClassGroups = Object.keys(classKeyMap)
        .map(key => ({ key, items: classKeyMap[key] }))
        .filter(group => group.items.length > 1)
        .sort((a, b) => b.items.length - a.items.length);

      return {
        suspiciousTrainerGroups,
        duplicateClassGroups,
        formattingIssues,
        issueCount: suspiciousTrainerGroups.length + duplicateClassGroups.length + formattingIssues.length,
      };
    }

    function sortByClassOrder(a, b) {
      return [
        cleanText(a.branch || a.Branch).localeCompare(cleanText(b.branch || b.Branch)),
        cleanText(a.jamSection || a['Jam/Section']).localeCompare(cleanText(b.jamSection || b['Jam/Section'])),
        cleanText(a.level || a.Level).localeCompare(cleanText(b.level || b.Level)),
        displayTrainerName(a.trainerName || a['Trainer Name']).localeCompare(displayTrainerName(b.trainerName || b['Trainer Name'])),
      ].find(result => result !== 0) || 0;
    }

    function matchesSearch(row, query) {
      const q = cleanText(query).toLowerCase();
      if (!q) return true;

      return [
        row.branch,
        row.date,
        row.day,
        row.jamSection,
        row.level,
        row.trainerName,
        displayTrainerName(row.trainerName),
        row['Trainer Name'],
        row.Level,
        row['Jam/Section'],
      ].some(value => cleanText(value).toLowerCase().includes(q));
    }

    /***********************
     * APP
     ***********************/
    function App() {
      const today = new Date();

      const [theme, setTheme] = useState(localStorage.getItem(THEME_KEY) || 'dark');
      const [activeMenu, setActiveMenu] = useState('dashboard');
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [toast, setToast] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [accessError, setAccessError] = useState('');

      const [classes, setClasses] = useState([]);
      const [dailyStudents, setDailyStudents] = useState([]);
      const [matrixDate, setMatrixDate] = useState(makeLocalDateInput(today));
      const [matrixRows, setMatrixRows] = useState([]);
      const [matrixSearch, setMatrixSearch] = useState('');
      const [recordsSearch, setRecordsSearch] = useState('');

      const [recapMonth, setRecapMonth] = useState(today.getMonth() + 1);
      const [recapYear, setRecapYear] = useState(today.getFullYear());
      const [monthlyRecap, setMonthlyRecap] = useState(null);

      const [attendanceSettings, setAttendanceSettings] = useState(() => {
        try {
          const saved = localStorage.getItem(ATTENDANCE_SETTINGS_KEY);
          return saved ? JSON.parse(saved) : DEFAULT_ATTENDANCE_SETTINGS;
        } catch (error) {
          return DEFAULT_ATTENDANCE_SETTINGS;
        }
      });

      const [classForm, setClassForm] = useState({
        id: '',
        trainerName: '',
        level: '',
        jamSection: '',
        branch: '',
        status: 'Active',
      });

      const [filters, setFilters] = useState({
        date: '',
        month: '',
        year: '',
      });

      const isDark = theme === 'dark';

      const classHealth = useMemo(() => analyzeClassData(classes), [classes]);
      const trainerSuggestions = useMemo(() => buildTrainerSuggestions(classes), [classes]);

      const stats = useMemo(() => {
        const totalStudents = dailyStudents.reduce((sum, item) => sum + Number(item['Murid Hadir'] || 0), 0);
        const filledMatrix = matrixRows.filter(row => row.muridHadir !== '' && row.muridHadir !== null && row.muridHadir !== undefined).length;
        const savedMatrix = matrixRows.filter(row => row.isSaved).length;

        return {
          totalClasses: classes.length,
          activeClasses: classes.filter(item => cleanText(item.Status).toLowerCase() === 'active').length,
          totalReports: dailyStudents.length,
          totalStudents,
          filledMatrix,
          savedMatrix,
          issueCount: classHealth.issueCount,
        };
      }, [classes, dailyStudents, matrixRows, classHealth]);

      useEffect(() => {
        document.documentElement.classList.toggle('dark', isDark);
        localStorage.setItem(THEME_KEY, theme);
      }, [theme]);

      useEffect(() => {
        localStorage.setItem(ATTENDANCE_SETTINGS_KEY, JSON.stringify(attendanceSettings));
      }, [attendanceSettings]);

      useEffect(() => {
        boot();
      }, []);

      function smoothToggleTheme() {
        document.body.classList.add('theme-switching');
        setTheme(prev => prev === 'dark' ? 'light' : 'dark');
        setTimeout(() => document.body.classList.remove('theme-switching'), 420);
      }

      function showToast(type, text) {
        setToast({ type, text });
        setTimeout(() => setToast(null), 3600);
      }

      function showSuccess(text) {
        showToast('success', text);
      }

      function showError(text) {
        showToast('error', text);
      }

      function openConfirm(config) {
        setConfirmDialog({
          title: config.title || 'Are you sure?',
          message: config.message || 'This action needs confirmation.',
          confirmText: config.confirmText || 'Confirm',
          cancelText: config.cancelText || 'Cancel',
          tone: config.tone || 'danger',
          onConfirm: config.onConfirm,
        });
      }

      function closeConfirm() {
        setConfirmDialog(null);
      }

      function redirectToLogin() {
        window.location.href = 'index.html';
      }

      async function boot() {
        setLoading(true);
        setAccessError('');

        try {
          const token = localStorage.getItem(SESSION_KEY);

          if (!token) {
            redirectToLogin();
            return;
          }

          const sessionResponse = await runGas('getUserSession', token);

          if (!sessionResponse.success) {
            localStorage.removeItem(SESSION_KEY);
            redirectToLogin();
            return;
          }

          if (sessionResponse.user.role !== 'Admin') {
            setAccessError('Akses ditolak. Halaman ini hanya untuk Admin.');
            setLoading(false);
            return;
          }

          setUser(sessionResponse.user);
          setClassForm(prev => ({ ...prev, branch: sessionResponse.user.branch }));

          await Promise.all([
            loadClasses(token),
            loadDailyStudents(token),
            loadDailyMatrix(token, matrixDate),
            loadMonthlyRecap(token, recapMonth, recapYear),
          ]);
        } catch (err) {
          setAccessError(err.message || 'Gagal memuat dashboard.');
        } finally {
          setLoading(false);
        }
      }

      async function loadClasses(tokenParam) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getClassDetails', token);

        if (response.success) {
          const data = (response.data || []).slice().sort(sortByClassOrder);
          setClasses(data);
        } else {
          showError(response.message || 'Gagal memuat class.');
        }
      }

      async function loadDailyStudents(tokenParam, customFilters) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getDailyStudents', token, customFilters || filters);

        if (response.success) {
          setDailyStudents(response.data || []);
        } else {
          showError(response.message || 'Gagal memuat data murid.');
        }
      }

      async function loadDailyMatrix(tokenParam, dateParam) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getDailyInputMatrix', token, dateParam || matrixDate);

        if (response.success) {
          const data = (response.data || []).slice().sort(sortByClassOrder);
          setMatrixRows(data);
        } else {
          showError(response.message || 'Gagal memuat matrix input.');
        }
      }

      async function loadMonthlyRecap(tokenParam, monthParam, yearParam) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getMonthlyDashboardRecap', token, Number(monthParam), Number(yearParam));

        if (response.success) {
          setMonthlyRecap(response.data);
        } else {
          showError(response.message || 'Gagal memuat monthly recap.');
        }
      }

      async function handleChangeMatrixDate(value) {
        setMatrixDate(value);
        await loadDailyMatrix(null, value);
      }

      async function handleChangeRecapMonth(value) {
        const month = Number(value);
        setRecapMonth(month);
        await loadMonthlyRecap(null, month, recapYear);
      }

      async function handleChangeRecapYear(value) {
        const year = Number(value);
        setRecapYear(year);
        await loadMonthlyRecap(null, recapMonth, year);
      }

      function updateMatrixValue(index, value) {
        setMatrixRows(prev => {
          const copy = [...prev];
          const original = copy[index]?.originalMuridHadir;

          copy[index] = {
            ...copy[index],
            muridHadir: value,
            isEdited: String(value) !== String(original || ''),
          };

          return copy;
        });
      }

      function confirmSaveAllDaily() {
        const rowsToSave = matrixRows.filter(row => row.muridHadir !== '' && row.muridHadir !== null && row.muridHadir !== undefined);

        if (!rowsToSave.length) {
          showError('Belum ada data murid yang diisi.');
          return;
        }

        openConfirm({
          title: 'Save attendance?',
          message: 'Data baru akan dibuat. Data lama pada kombinasi Branch + Date + Jam/Section + Level + Trainer akan diperbarui tanpa duplicate.',
          confirmText: 'Save All',
          tone: 'success',
          onConfirm: saveAllDaily,
        });
      }

      async function saveAllDaily() {
        closeConfirm();
        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);
          const rowsToSave = matrixRows.filter(row => row.muridHadir !== '' && row.muridHadir !== null && row.muridHadir !== undefined);
          const response = await runGas('saveDailyStudentsBulk', token, matrixDate, rowsToSave);

          if (!response.success) {
            showError(response.message || 'Gagal menyimpan bulk data.');
            return;
          }

          await Promise.all([
            loadDailyMatrix(token, matrixDate),
            loadDailyStudents(token),
            loadMonthlyRecap(token, recapMonth, recapYear),
          ]);

          showSuccess(response.message || 'Data berhasil disimpan.');
        } catch (err) {
          showError(err.message || 'Terjadi error saat menyimpan bulk data.');
        } finally {
          setSaving(false);
        }
      }

      async function applyFilters() {
        await loadDailyStudents(null, filters);
      }

      async function clearFilters() {
        const empty = { date: '', month: '', year: '' };
        setFilters(empty);
        setRecordsSearch('');
        await loadDailyStudents(null, empty);
      }

      function requestDeleteDaily(id) {
        openConfirm({
          title: 'Delete daily record?',
          message: 'Data murid harian ini akan dihapus dari database. Aksi ini tidak bisa dibatalkan.',
          confirmText: 'Delete',
          tone: 'danger',
          onConfirm: () => deleteDaily(id),
        });
      }

      async function deleteDaily(id) {
        closeConfirm();
        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);
          const response = await runGas('deleteDailyStudent', token, id);

          if (!response.success) {
            showError(response.message || 'Gagal menghapus data.');
            return;
          }

          await Promise.all([
            loadDailyStudents(token),
            loadDailyMatrix(token, matrixDate),
            loadMonthlyRecap(token, recapMonth, recapYear),
          ]);

          showSuccess(response.message || 'Data berhasil dihapus.');
        } catch (err) {
          showError(err.message || 'Terjadi error saat menghapus data.');
        } finally {
          setSaving(false);
        }
      }

      async function handleSubmitClass(e) {
        e.preventDefault();

        const payload = normalizeClassPayload(classForm);

        if (!payload.trainerName || !payload.level || !payload.jamSection || !payload.branch) {
          showError('Trainer Name, Level, Jam/Section, dan Branch wajib diisi.');
          return;
        }

        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);
          const response = classForm.id
            ? await runGas('updateClassDetail', token, classForm.id, payload)
            : await runGas('createClassDetail', token, payload);

          if (!response.success) {
            showError(response.message || 'Gagal menyimpan class.');
            return;
          }

          resetClassForm();

          await Promise.all([
            loadClasses(token),
            loadDailyMatrix(token, matrixDate),
            loadMonthlyRecap(token, recapMonth, recapYear),
          ]);

          showSuccess(response.message || 'Class berhasil disimpan.');
        } catch (err) {
          showError(err.message || 'Terjadi error saat menyimpan class.');
        } finally {
          setSaving(false);
        }
      }

      function editClass(item) {
        setClassForm({
          id: item.ID,
          trainerName: displayTrainerName(item['Trainer Name']),
          level: cleanText(item.Level),
          jamSection: cleanText(item['Jam/Section']),
          branch: cleanText(item.Branch),
          status: cleanText(item.Status || 'Active'),
        });

        setActiveMenu('classes');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function requestDeleteClass(id) {
        openConfirm({
          title: 'Delete class?',
          message: 'Class ini akan dihapus dari ClassDetails. Pastikan tidak sedang digunakan untuk input aktif.',
          confirmText: 'Delete',
          tone: 'danger',
          onConfirm: () => deleteClass(id),
        });
      }

      async function deleteClass(id) {
        closeConfirm();
        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);
          const response = await runGas('deleteClassDetail', token, id);

          if (!response.success) {
            showError(response.message || 'Gagal menghapus class.');
            return;
          }

          await Promise.all([
            loadClasses(token),
            loadDailyMatrix(token, matrixDate),
            loadMonthlyRecap(token, recapMonth, recapYear),
          ]);

          showSuccess(response.message || 'Class berhasil dihapus.');
        } catch (err) {
          showError(err.message || 'Terjadi error saat menghapus class.');
        } finally {
          setSaving(false);
        }
      }

      function resetClassForm() {
        setClassForm({
          id: '',
          trainerName: '',
          level: '',
          jamSection: '',
          branch: user?.branch || '',
          status: 'Active',
        });
      }

      function saveSettings(newSettings) {
        setAttendanceSettings(newSettings);
        showSuccess('Settings warna attendance berhasil disimpan.');
      }

      function resetSettings() {
        setAttendanceSettings(DEFAULT_ATTENDANCE_SETTINGS);
        showSuccess('Settings dikembalikan ke default.');
      }

      function requestLogout() {
        openConfirm({
          title: 'Logout from dashboard?',
          message: 'Session kamu akan diakhiri dan kamu akan kembali ke halaman login.',
          confirmText: 'Logout',
          tone: 'neutral',
          onConfirm: handleLogout,
        });
      }

      async function handleLogout() {
        closeConfirm();

        try {
          const token = localStorage.getItem(SESSION_KEY);
          await runGas('logoutUser', token);
        } catch (err) {
          console.error(err);
        } finally {
          localStorage.removeItem(SESSION_KEY);
          redirectToLogin();
        }
      }

      const pageClass = isDark
        ? 'dark min-h-screen bg-[#020617] text-white'
        : 'min-h-screen bg-slate-100 text-slate-950';

            </div>
          </div>

    function DashboardView({ isDark, recapMonth, recapYear, monthlyRecap, attendanceSettings, onChangeMonth, onChangeYear }) {
      const summary = monthlyRecap?.summary || {};
      const dailyTotals = monthlyRecap?.dailyTotals || [];
      const classes = monthlyRecap?.classes || [];
      const workingDays = getWorkingDaysInMonth(recapMonth, recapYear);

      const workingDailyTotals = workingDays.map(dayInfo => {
        const found = dailyTotals.find(item => Number(item.day) === Number(dayInfo.day));
        return { ...dayInfo, total: Number(found?.total || 0) };
      });

      const maxTotal = Math.max(...workingDailyTotals.map(item => Number(item.total || 0)), 1);

      return (
        <section className="space-y-6 slide-up">
          <div className={cardClass(isDark) + ' rounded-[2rem] p-5 sm:p-6'}>
            <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
              <SectionTitle
                icon="chart"
                title="Monthly Dashboard"
                subtitle="Recap murid hadir per class, hanya hari kerja Senin–Jumat."
                isDark={isDark}
              />

              <div className="grid grid-cols-2 gap-3 w-full lg:w-auto">
                <Select
                  isDark={isDark}
                  label="Month"
                  value={recapMonth}
                  onChange={onChangeMonth}
                  options={MONTH_NAMES.map((name, index) => ({ value: index + 1, label: name }))}
                />

                <Input
                  isDark={isDark}
                  label="Year"
                  type="number"
                  value={recapYear}
                  onChange={onChangeYear}
                />
              </div>
            </div>
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
            <StatCard isDark={isDark} label="Grand Total" value={summary.grandTotal || 0} icon="users" />
            <StatCard isDark={isDark} label="Avg / Day" value={summary.averagePerDay || 0} icon="chart" />
            <StatCard isDark={isDark} label="Active Class" value={summary.activeClassCount || 0} icon="layers" />
            <StatCard isDark={isDark} label="Filled Records" value={summary.filledRecords || 0} icon="database" />
          </div>

          <div className={cardClass(isDark) + ' rounded-[2rem] p-5 sm:p-6'}>
            <div className="flex items-center justify-between gap-3 mb-5">
              <div>
                <h2 className="text-lg font-black">Daily Total Chart</h2>
                <p className={mutedClass(isDark)}>Total murid hadir per tanggal kerja.</p>
              </div>
              <span className={badgeClass(isDark)}>{MONTH_NAMES[recapMonth - 1]} {recapYear}</span>
            </div>

            <div className="overflow-x-auto custom-scroll pb-2">
              <div className="min-w-[900px] h-64 flex items-end gap-2">
                {workingDailyTotals.map(item => {
                  const height = Math.max(8, (Number(item.total || 0) / maxTotal) * 210);

                  return (
                    <div key={item.day} className="flex-1 flex flex-col items-center gap-2">
                      <div className="text-[11px] font-black opacity-70">{item.total}</div>
                      <div className={getAttendanceColorClass(Number(item.total || 0), attendanceSettings, 'bar')} style={{ height: `${height}px` }}></div>
                      <div className="text-[10px] opacity-60 text-center leading-tight">{item.label}<br />{item.weekdayLabelId}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className={cardClass(isDark) + ' rounded-[2rem] p-5 sm:p-6 overflow-hidden'}>
            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-5">
              <div>
                <h2 className="text-lg font-black">Horizontal Recap</h2>
                <p className={mutedClass(isDark)}>Baris = class, kolom = hari + tanggal kerja.</p>
              </div>
              <AttendanceLegend settings={attendanceSettings} />
            </div>

            {classes.length === 0 ? (
              <EmptyState isDark={isDark} text="Belum ada data recap untuk bulan ini." />
            ) : (
              <div className="max-h-[62vh] overflow-auto custom-scroll">
                <table className="w-full min-w-[1180px] text-xs">
                  <thead className={isDark ? 'sticky top-0 z-10 bg-slate-900/95 backdrop-blur-xl' : 'sticky top-0 z-10 bg-white/95 backdrop-blur-xl'}>
                    <tr className={isDark ? 'border-b border-white/10 text-white/50' : 'border-b border-slate-200 text-slate-500'}>
                      <th rowSpan="2" className="sticky left-0 z-20 py-3 pr-4 text-left min-w-[240px] bg-inherit align-middle">Class</th>
                      <th colSpan={workingDays.length} className="py-3 px-2 text-center text-[13px] font-black uppercase tracking-[0.18em]">
                        {MONTH_NAMES[recapMonth - 1]} {recapYear}
                      </th>
                      <th rowSpan="2" className="py-3 px-3 text-center min-w-[70px] align-middle">Total</th>
                    </tr>

                    <tr className={isDark ? 'border-b border-white/10 text-white/50' : 'border-b border-slate-200 text-slate-500'}>
                      {workingDays.map(dayInfo => (
                        <th key={dayInfo.day} className="py-3 px-2 text-center min-w-[58px]">
                          <span className="block font-black">{dayInfo.weekdayDateLabel}</span>
                        </th>
                      ))}
                    </tr>
                  </thead>

                  <tbody>
                    {classes.map(row => {
                      const workingRowDays = workingDays.map(dayInfo => {
                        const found = (row.days || []).find(day => Number(day.day) === Number(dayInfo.day));
                        return found || { day: dayInfo.day, value: '' };
                      });

                      const workingTotal = workingRowDays.reduce((sum, day) => {
                        return sum + (day.value === '' || day.value === null || day.value === undefined ? 0 : Number(day.value || 0));
                      }, 0);

                      return (
                        <tr key={row.classId} className={isDark ? 'border-b border-white/5' : 'border-b border-slate-100'}>
                          <td className={isDark ? 'sticky left-0 z-10 py-3 pr-4 bg-slate-900/95' : 'sticky left-0 z-10 py-3 pr-4 bg-white/95'}>

                              <span className={getAttendanceColorClass(day.value, attendanceSettings, 'cell')}>
                                {day.value === '' ? '-' : day.value}
                              </span>
                            </td>
                          ))}

                          <td className="py-3 px-3 text-center font-black">{workingTotal}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </section>
      );
    }

    function SettingsView({ isDark, settings, onSave, onReset }) {

      function submit(e) {
        e.preventDefault();

        const clean = {
          lowMax: Number(form.lowMax),
          mediumMin: Number(form.mediumMin),
          mediumMax: Number(form.mediumMax),
          highMin: Number(form.highMin),
        };

        if (Object.values(clean).some(value => isNaN(value))) return;

        onSave(clean);
      }

      return (
        <section className="grid grid-cols-1 lg:grid-cols-[430px_1fr] gap-6 slide-up">
          <div className={cardClass(isDark) + ' rounded-[2rem] p-5 sm:p-6 h-fit'}>

              <Input isDark={isDark} label="Merah jika ≤" type="number" value={form.lowMax} onChange={(value) => setForm(prev => ({ ...prev, lowMax: value }))} />
              <Input isDark={isDark} label="Kuning mulai dari" type="number" value={form.mediumMin} onChange={(value) => setForm(prev => ({ ...prev, mediumMin: value }))} />
              <Input isDark={isDark} label="Kuning sampai" type="number" value={form.mediumMax} onChange={(value) => setForm(prev => ({ ...prev, mediumMax: value }))} />

              <div className="flex gap-3">

    function ClassDataHealthPanel({ isDark, classHealth, onEdit }) {

              <h3 className="text-2xl sm:text-3xl font-black mt-1">{value}</h3>

            <div className={iconWrap}>
              <Icon name={icon} className="w-5 h-5" />
            </div>
          </div>
        </div>

    function ConfirmDialog({ dialog, isDark, onClose }) {
      if (!dialog) return null;

      const isDanger = dialog.tone === 'danger';
      const isSuccess = dialog.tone === 'success';

      const iconClass = isDanger
        ? 'bg-red-500/15 text-red-500 border-red-500/20'
        : isSuccess
          ? 'bg-emerald-500/15 text-emerald-500 border-emerald-500/20'
          : isDark
            ? 'bg-white/10 text-white border-white/10'
            : 'bg-slate-950/5 text-slate-950 border-slate-200';

      const confirmClass = isDanger
        ? 'bg-red-500 text-white hover:bg-red-600'
        : isSuccess
          ? 'bg-emerald-500 text-white hover:bg-emerald-600'
          : isDark
            ? 'bg-white text-slate-950 hover:bg-slate-200'
            : 'bg-slate-950 text-white hover:bg-slate-800';

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-6">
          <div onClick={onClose} className="absolute inset-0 bg-black/55 backdrop-blur-sm"></div>

          <div className={cardClass(isDark) + ' relative w-full max-w-md rounded-[2rem] p-6 modal-pop'}>
            <div className={`w-14 h-14 rounded-3xl border flex items-center justify-center mb-5 ${iconClass}`}>
              <Icon name={isDanger ? 'trash' : isSuccess ? 'check' : 'spark'} className="w-7 h-7" />
            </div>

            <h3 className="text-xl font-black mb-2">{dialog.title}</h3>
            <p className={mutedClass(isDark) + ' leading-relaxed mb-6'}>{dialog.message}</p>

            <div className="flex gap-3">
              <button onClick={onClose} className={secondaryButtonClass(isDark) + ' flex-1'}>{dialog.cancelText}</button>
              <button onClick={dialog.onConfirm} className={`h-11 px-5 rounded-2xl font-black active:scale-[0.98] flex-1 ${confirmClass}`}>{dialog.confirmText}</button>
            </div>
          </div>
        </div>
      );

    function Toast({ toast, isDark }) {
      if (!toast) return null;

      const isSuccess = toast.type === 'success';
      const boxClass = isSuccess
        ? isDark
          ? 'bg-emerald-500/15 text-emerald-100 border-emerald-400/20'
          : 'bg-emerald-50 text-emerald-700 border-emerald-200'
        : isDark
          ? 'bg-red-500/15 text-red-100 border-red-400/20'
          : 'bg-red-50 text-red-700 border-red-200';

      return (
        <div className="fixed left-4 right-4 bottom-32 z-50 flex justify-center pointer-events-none">
          <div className={`toast-in pointer-events-auto max-w-md w-full rounded-3xl border px-4 py-4 shadow-2xl backdrop-blur-xl ${boxClass}`}>

              <p className="text-sm font-bold leading-relaxed">{toast.text}</p>
            </div>
          </div>
        </div>
      );

      return <span className={`inline-flex h-8 items-center px-3 rounded-full border text-xs font-black ${cls}`}>{text}</span>;

      return isDark
        ? 'bg-slate-900/82 border border-white/10 shadow-2xl shadow-black/25 backdrop-blur-xl'
        : 'bg-white/86 border border-white shadow-xl shadow-slate-200/70 backdrop-blur-xl';
    }

    function softBoxClass(isDark) {
      return isDark
        ? 'bg-white/[0.055] border border-white/10'
        : 'bg-slate-950/[0.035] border border-slate-200';
    }

    function warningCardClass(isDark) {
      return isDark
        ? 'bg-amber-500/12 border border-amber-400/20 text-amber-100 shadow-xl shadow-black/20'
        : 'bg-amber-50 border border-amber-200 text-amber-800 shadow-lg shadow-amber-100/60';
    }

    function successCardClass(isDark) {
      return isDark
        ? 'bg-emerald-500/12 border border-emerald-400/20 text-emerald-100 shadow-xl shadow-black/20'
        : 'bg-emerald-50 border border-emerald-200 text-emerald-800 shadow-lg shadow-emerald-100/60';
    }

    function mutedClass(isDark) {
      return isDark ? 'text-sm text-white/55' : 'text-sm text-slate-500';
    }

    function badgeClass(isDark) {
      return isDark
        ? 'inline-flex h-9 items-center px-3 rounded-full bg-white/10 border border-white/10 text-xs font-black text-white/80'
        : 'inline-flex h-9 items-center px-3 rounded-full bg-slate-950/5 border border-slate-200 text-xs font-black text-slate-600';
    }

    function inputClass(isDark, disabled = false) {
      const base = 'w-full h-11 px-4 rounded-2xl outline-none border text-sm font-semibold disabled:opacity-60 disabled:cursor-not-allowed focus:ring-4';

      return disabled
        ? isDark
          ? `${base} bg-white/5 border-white/10 text-white/55 focus:ring-white/0`
          : `${base} bg-slate-100 border-slate-200 text-slate-500 focus:ring-slate-300/0`
        : isDark
          ? `${base} bg-white/10 border-white/10 text-white placeholder:text-white/30 focus:border-blue-400/70 focus:ring-blue-400/10`
          : `${base} bg-white border-slate-200 text-slate-950 placeholder:text-slate-400 focus:border-blue-500/70 focus:ring-blue-500/10`;
    }

    function primaryButtonClass(isDark) {
      return isDark
        ? 'w-full h-11 px-5 rounded-2xl bg-white text-slate-950 font-black hover:bg-slate-200 active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed'
        : 'w-full h-11 px-5 rounded-2xl bg-slate-950 text-white font-black hover:bg-slate-800 active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed';
    }

    function secondaryButtonClass(isDark) {
      return isDark
        ? 'w-full h-11 px-5 rounded-2xl bg-white/10 text-white font-black border border-white/10 hover:bg-white/15 active:scale-[0.98]'
        : 'w-full h-11 px-5 rounded-2xl bg-slate-950/5 text-slate-950 font-black border border-slate-200 hover:bg-slate-950/10 active:scale-[0.98]';
    }

    function iconButtonClass(isDark) {
      return isDark
        ? 'w-11 h-11 rounded-2xl bg-white/10 border border-white/10 flex items-center justify-center hover:bg-white/15 active:scale-[0.97]'
        : 'w-11 h-11 rounded-2xl bg-slate-950/5 border border-slate-200 flex items-center justify-center hover:bg-slate-950/10 active:scale-[0.97]';
    }

    function getAttendanceColorClass(value, settings, type) {
      if (value === '' || value === null || value === undefined) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-slate-400/20'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
      }

      const number = Number(value);

      if (isNaN(number)) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-slate-400/20'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
      }

      if (number <= Number(settings.lowMax)) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-red-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-red-500/15 text-red-500 border border-red-500/20 font-black';
      }

      if (number >= Number(settings.mediumMin) && number <= Number(settings.mediumMax)) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-amber-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-amber-500/15 text-amber-500 border border-amber-500/20 font-black';
      }

      if (number >= Number(settings.highMin)) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-emerald-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-emerald-500/15 text-emerald-500 border border-emerald-500/20 font-black';
      }

      return type === 'bar'
        ? 'w-full rounded-t-xl bg-slate-400/40'
        : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
    }

    /***********************
     * ICONS
     ***********************/
    function Icon({ name, className = 'w-5 h-5' }) {
      const icons = {
        chart: (
          <>
            <path d="M3 3v18h18" />

          </>
        ),
        edit: <path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" />,
        database: (
          <>
            <ellipse cx="12" cy="5" rx="8" ry="3" />
            <path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5" />
            <path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" />
          </>
        ),
        layers: (
          <>
            <path d="M12 3 3 8l9 5 9-5-9-5Z" />
            <path d="m3 13 9 5 9-5" />

          </>
        ),
        settings: (
          <>
            <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />
            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.87l-.06-.06A2 2 0 1 1 6.73 3.2l.06.06A1.7 1.7 0 0 0 8.6 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 8.6a1.7 1.7 0 0 0 .6 1 1.7 1.7 0 0 0 1.1.4H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z" />
          </>
        ),
        user: (
          <>
            <circle cx="12" cy="8" r="4" />
            <path d="M4 21c1.6-4 4.2-6 8-6s6.4 2 8 6" />
          </>
        ),
        users: (
          <>
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />

          </>
        ),
        calendar: (
          <>
            <path d="M8 2v4M16 2v4M3 10h18" />
            <rect x="3" y="4" width="18" height="18" rx="2" />
          </>
        ),
        check: (
          <>
            <path d="M20 6 9 17l-5-5" />
          </>
        ),
        alert: (
          <>
            <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />
            <path d="M12 9v4" />
            <path d="M12 17h.01" />
          </>
        ),
        trash: (
          <>
            <path d="M3 6h18" />
            <path d="M8 6V4h8v2" />
            <path d="M19 6l-1 14H6L5 6" />
            <path d="M10 11v6M14 11v6" />
          </>
        ),
        logout: (
          <>
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <path d="M16 17l5-5-5-5" />
            <path d="M21 12H9" />
          </>
        ),
        sun: (
          <>
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
          </>
        ),
        moon: <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" />,
        spark: (
          <>
            <path d="M13 2 3 14h8l-1 8 10-12h-8l1-8Z" />
          </>
        ),
        empty: (
          <>
            <path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
            <path d="M3.3 7 12 12l8.7-5" />
            <path d="M12 22V12" />
          </>

      };

      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          {icons[name] || icons.spark}
        </svg>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
